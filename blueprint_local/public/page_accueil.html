<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil - BluePrint</title>

  <!-- Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" />

  <!-- Bulma -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="/styles/accueil.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar is-light" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item" href="/page_accueil.html">
      <img src="/images/barre.png" alt="barre">
    </a>

    <a role="button" class="navbar-burger" data-target="main-navbar" aria-label="menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </a>
  </div>

  <div id="main-navbar" class="navbar-menu">
    <div class="navbar-end">
      <a class="navbar-item" href="/page_accueil.html">
        <img src="/images/epf-logo-right.png" alt="Logo">
      </a>
    </div>
  </div>
</nav>

<!-- HERO (BANDEAU) -->
<section class="bandeau" style="background-image:url('/images/capture.jpg'); background-size:cover;">
  <div class="hero-body">
    <div class="container">
      <h1 class="title has-text-white">
        Portail
      </h1>
      <h2 class="subtitle has-text-white">
        Ici retrouvez l'ensemble des projets étudiants de l'EPF
      </h2>
    </div>
  </div>
</section>

<!-- TAGS DE FILTRE -->
<section class="section">
  <div class="project-list">
    <div class="tags-bar" id="tagsBar" role="list">
      <!-- Bouton 'Tous les projets' -->
      <button class="tag-pill active" data-tag="__all__" aria-pressed="true">Tous les projets</button>
      <!-- Les tags seront chargés dynamiquement depuis l'API -->
    </div>
  </div>
</section>

<!-- CONTENU PRINCIPAL -->
<section class="section">
  <div class="container">
    <!-- Grille principale : gauche (vidéo) et droite (projets) -->
    <div class="main-grid">
      
      <!-- PARTIE GAUCHE : Projet mis en avant (position 1) -->
      <div class="featured-project">
        <div class="featured-media">
          <video controls id="featured-video" style="display: none;">
            Votre navigateur ne supporte pas la vidéo.
          </video>
          <img id="featured-image" src="/images/project-placeholder.png" alt="Projet en vedette" style="display: none;">
          <div id="featured-placeholder" class="media-placeholder">
            <p>Chargement du projet en vedette...</p>
          </div>
        </div>
        <div class="featured-content">
          <h3 id="featured-project-title">Projet en vedette</h3>
          <p id="featured-project-desc">Chargement...</p>
          <a id="featured-project-link" href="#" class="featured-link" style="display: none;">En savoir plus →</a>
        </div>
      </div>

      <!-- PARTIE DROITE : Projets à la une (positions 2, 3, 4) -->
      <div class="side-projects">
        <h2 class="side-projects-title">Projets à la une</h2>
        <div id="recent-projects-list">
          <p>Chargement des projets...</p>
        </div>
      </div>
    </div>

    <!-- BOUTON -->
    <div class="has-text-centered">
      <a href="/public/project_list.html" class="button is-black">
        Voir plus
      </a>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="content has-text-centered">

    <p><strong>© 2024 EPF</strong></p>

    <p>
      <a href="/contactez-nous">Contact</a> •
      <a href="/mentions-legales">Mentions légales</a> •
      <a href="/donnees-personnelles">Données personnelles</a> •
      <a href="/presse">Presse</a>
    </p>

    <div class="columns is-mobile is-centered is-multiline">
      <div class="column is-narrow"><img src="/images/cge.png" width="80"></div>
      <div class="column is-narrow"><img src="/images/cti-logo-cmjn.png" width="80"></div>
      <div class="column is-narrow"><img src="/images/eespig.jpeg" width="80"></div>
      <div class="column is-narrow"><img src="/images/eur-ace-0.png" width="80"></div>
      <div class="column is-narrow"><img src="/images/logo-qualiopi.jpeg" width="80"></div>
      <div class="column is-narrow"><img src="/images/concours-avenir-logo.jpeg" width="80"></div>
      <div class="column is-narrow"><img src="/images/label-campusfrance-bienv.jpg" width="80"></div>
    </div>

  </div>
</footer>

<script src="/scripts/accueil.js"></script>

</body>
</html>
